name: Build and Push Image

on:
  push:
    branches: [main]
  release:
    types: [published]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  tests:
    permissions:
      contents: read
    uses: ljmerza/misc-actions/.github/workflows/python-tests.yml@v2
    with:
      python-version: "3.13"
      coverage-source: backup
      env-vars: |
        SECRET_KEY=test-secret-key-for-ci
        DEBUG=True
        ALLOWED_HOSTS=localhost,127.0.0.1
    secrets: inherit

  build:
    needs: tests
    permissions:
      contents: read
      packages: write
      attestations: write
      id-token: write
    uses: ljmerza/misc-actions/.github/workflows/docker-release.yml@v2
    with:
      image-name: ghcr.io/${{ github.repository_owner }}/flowhistory
    secrets: inherit
