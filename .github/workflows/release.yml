name: Release — Tag Latest

on:
  release:
    types: [published]

permissions:
  contents: read
  packages: write

env:
  IMAGE_NAME: ghcr.io/${{ github.repository_owner }}/flowhistory

# NOTE: github.repository_owner may contain uppercase letters but OCI
# references must be lowercase.  The docker/* actions handle this
# internally; crane does not, so we lowercase in the shell below.

jobs:
  tag-latest:
    runs-on: ubuntu-latest
    steps:
      - name: Install crane
        uses: imjasonh/setup-crane@v0.5

      - name: Log in to GHCR
        run: echo "${{ secrets.GITHUB_TOKEN }}" | crane auth login ghcr.io -u ${{ github.actor }} --password-stdin

      - name: Tag release as latest
        run: |
          IMAGE="${IMAGE_NAME,,}"
          TAG="${{ github.event.release.tag_name }}"
          echo "Tagging ${IMAGE}:${TAG} as ${IMAGE}:latest"
          success=false
          for i in 1 2 3 4 5; do
            crane tag "${IMAGE}:${TAG}" latest && success=true && break
            echo "Attempt $i failed, image may not be pushed yet."
            [ "$i" -lt 5 ] && sleep 30
          done

          if [ "$success" = false ]; then
            echo "Failed to tag after 5 attempts"
            exit 1
          fi

          {
            echo "### Docker Image"
            echo ""
            echo "| Tag | Pull command |"
            echo "|-----|-------------|"
            echo "| \`latest\` | \`docker pull ${IMAGE}:latest\` |"
            echo "| \`${TAG}\` | \`docker pull ${IMAGE}:${TAG}\` |"
          } >> "$GITHUB_STEP_SUMMARY"
