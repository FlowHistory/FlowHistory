name: Tests

on:
  workflow_call: {}

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: ljmerza/misc-actions/actions/ruff-lint@v1
        with:
          python-version: "3.13"

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: ljmerza/misc-actions/actions/python-test@v1
        with:
          python-version: "3.13"
          coverage-source: backup
          codecov-token: ${{ secrets.CODECOV_TOKEN }}
          env-vars: |
            SECRET_KEY=test-secret-key-for-ci
            DEBUG=True
            ALLOWED_HOSTS=localhost,127.0.0.1
