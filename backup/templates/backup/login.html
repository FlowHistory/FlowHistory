{% extends "backup/base.html" %}

{% block title %}Login — Node-RED Backup{% endblock %}

{% block content %}
<div class="mt-12 flex justify-center">
  <div class="w-full max-w-sm">
    <div class="rounded-lg border border-gray-200 bg-white p-6 shadow dark:border-gray-700 dark:bg-gray-800">
      <h4 class="mb-6 text-center text-lg font-semibold">Node-RED Backup</h4>

      {% if error %}
      <div class="mb-4 rounded-lg border border-red-200 bg-red-50 px-4 py-3 text-sm text-red-800 dark:border-red-800 dark:bg-red-900/30 dark:text-red-200" role="alert">{{ error }}</div>
      {% endif %}

      <form method="post">
        {% csrf_token %}
        <div class="mb-4">
          <label for="password" class="mb-1 block text-sm font-medium text-gray-700 dark:text-gray-300">Password</label>
          <input type="password" class="block w-full rounded-md border border-gray-300 px-3 py-2 text-sm shadow-sm focus:border-blue-500 focus:outline-none focus:ring-1 focus:ring-blue-500 dark:border-gray-600 dark:bg-gray-700 dark:text-gray-100" id="password" name="password" autofocus required>
        </div>
        <button type="submit" class="btn-primary w-full">Sign In</button>
      </form>
    </div>
  </div>
</div>
{% endblock %}
