services:
  nodered-backup:
    build: .
    container_name: nodered-backup
    ports:
      - "9472:8000"
    volumes:
      - ./data:/app/data
      - ./backups:/app/backups
      - /media/cubxi/docker/volumes/nodered/data:/nodered-data
      - /var/run/docker.sock:/var/run/docker.sock:ro
    env_file:
      - .env
    restart: unless-stopped
    networks:
      - automation_network

networks:
  automation_network:
    external: true
    name: docker_automation_network
