services:
  flowhistory:
    build: .
    container_name: flowhistory
    ports:
      - "9472:8000"
    volumes:
      - ./data:/app/data
      - ./backups:/app/backups
      # - /path/to/nodered/data:/nodered-data
      # - /var/run/docker.sock:/var/run/docker.sock  # Required for container restart on restore
    env_file:
      - .env
    restart: unless-stopped
