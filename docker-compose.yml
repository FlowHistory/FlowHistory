services:
  flowhistory:
    build: .
    container_name: flowhistory
    ports:
      - "9472:8000"
    volumes:
      - ~/docker/volumes/nodered/backups/data:/app/data
      - ~/docker/volumes/nodered/backups/backups:/app/backups
      - /media/cubxi/docker/volumes/nodered/data:/nodered-data
      - /var/run/docker.sock:/var/run/docker.sock
    env_file:
      - .env
    restart: unless-stopped
    networks:
      - automation_network

networks:
  automation_network:
    external: true
    name: docker_automation_network
